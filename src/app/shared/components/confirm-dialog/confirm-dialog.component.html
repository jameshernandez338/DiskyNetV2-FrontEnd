@if (show) {
  <!-- Backdrop -->
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4 backdrop-blur-sm"
  >
    <!-- Dialog -->
    <div
      class="w-full max-w-sm rounded-xl border border-slate-200 bg-white shadow-xl"
    >
      <!-- Header -->
      <div class="flex items-start justify-between gap-3 border-b border-slate-100 px-5 py-4">
        <div class="flex items-center gap-2.5">
          @if (danger) {
            <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-red-50">
              <lucide-angular [img]="icons.TriangleAlert" class="h-5 w-5 text-red-500"></lucide-angular>
            </div>
          }
          <h3 class="text-base font-semibold text-slate-800">{{ title }}</h3>
        </div>
        <button
          type="button"
          (click)="cancelled.emit()"
          class="inline-flex h-7 w-7 items-center justify-center rounded-md text-slate-400 transition hover:bg-slate-100 hover:text-slate-600 focus:outline-none focus:ring-2 focus:ring-slate-200"
        >
          <lucide-angular [img]="icons.X" class="h-4 w-4"></lucide-angular>
        </button>
      </div>

      <!-- Body -->
      <div class="px-5 py-4">
        <p class="text-sm text-slate-600">{{ message }}</p>
      </div>

      <!-- Footer -->
      <div class="flex items-center justify-end gap-2 border-t border-slate-100 px-5 py-4">
        <button
          type="button"
          (click)="cancelled.emit()"
          class="inline-flex h-9 items-center gap-1.5 rounded-md border border-slate-200 px-4 text-sm font-medium text-slate-600 transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-200"
        >
          {{ cancelLabel }}
        </button>
        <button
          type="button"
          (click)="confirmed.emit()"
          class="inline-flex h-9 items-center gap-1.5 rounded-md px-4 text-sm font-medium text-white transition focus:outline-none focus:ring-2"
          [class]="danger
            ? 'bg-red-500 hover:bg-red-600 focus:ring-red-300'
            : 'bg-blue-500 hover:bg-blue-600 focus:ring-blue-300'"
        >
          {{ confirmLabel }}
        </button>
      </div>
    </div>
  </div>
}
