<div class="border-t border-slate-200 bg-[linear-gradient(180deg,#ffffff_0%,#f8fafc_100%)] px-5 py-4 sm:px-6">
  <div class="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between">
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:gap-4">
      <div class="inline-flex items-center gap-2 border border-slate-200 bg-white px-3 py-2 text-sm text-slate-500 shadow-sm">
        <span class=" text-slate-500">Mostrando {{ startItem() }} a {{ endItem() }} de {{ totalItems() }}</span>
      </div>
    </div>

    <div class="flex flex-wrap items-center gap-2">
      <button
        type="button"
        class="inline-flex h-9 w-9 items-center justify-center border border-slate-200 bg-white text-sm font-semibold text-slate-700 shadow-sm transition hover:-translate-y-0.5 hover:border-fuchsia-200 hover:text-fuchsia-800 disabled:translate-y-0 disabled:cursor-not-allowed disabled:opacity-45"
        [disabled]="currentPage() === 1"
        (click)="goToPage(currentPage() - 1)"
      >
        &lt;
      </button>

      <div class="flex items-center gap-1">
        @for (page of visiblePages(); track page; let index = $index) {
          @if (shouldShowLeadingEllipsis(page, index)) {
            <span class="px-2 text-sm font-semibold text-slate-300">...</span>
          }

          <button
            type="button"
            class="inline-flex h-9 min-w-9 items-center justify-center border border-slate-200 text-sm font-semibold"
            [class]="page === currentPage() ? 'bg-slate-950 text-white shadow-[0_10px_24px_rgba(15,23,42,0.18)]' : 'text-slate-600 hover:bg-fuchsia-50 hover:text-fuchsia-800'"
            (click)="goToPage(page)"
          >
            {{ page }}
          </button>
        }
      </div>

      <button
        type="button"
        class="inline-flex h-9 w-9 items-center justify-center border border-slate-200 bg-white text-sm font-semibold text-slate-700 shadow-sm transition hover:-translate-y-0.5 hover:border-fuchsia-200 hover:text-fuchsia-800 disabled:translate-y-0 disabled:cursor-not-allowed disabled:opacity-45"
        [disabled]="currentPage() === totalPages()"
        (click)="goToPage(currentPage() + 1)"
      >
        &gt;
      </button>
    </div>
  </div>
</div>
